{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevLabs - Vehicles</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="selection-body">
    <nav class="navbar">
        <div class="nav-links">
            <a href="{% url 'track_selection' %}">Circuits</a>
            <a href="{% url 'car_selection' %}?track={{ selected_track.slug_id }}" class="active" style="font-size: 1.3rem;">Vehicles</a>
        </div>
        <div class="user-profile">
            <span>DanDdC</span>
            <img src="{% static 'img/avatar-placeholder.png' %}" alt="User Avatar" class="avatar">
        </div>
    </nav>

    <div class="selection-container">
        <main class="main-selection-content">
            <header class="selection-header" style="align-items: center;">
                <div class="track-selected">
                    <span class="track-label" style="font-size: 1.3rem;">Track Selected:</span>
                    <div class="track-icon-wrapper" style="gap: 8px;">
                        <img src="{% static selected_track.image_path %}" alt="{{ selected_track.name }}" style="width: 110px;">
                        <span class="track-name" style="font-size: 1.1rem; font-weight: bold; color: #333;">{{ selected_track.name }}</span>
                    </div>
                </div>
                
                <div class="search-container">
                    <input type="text" id="car-search" class="search-bar rectangular-search" placeholder="Search vehicles...">
                </div>
            </header>

            <h2 style="text-align: center; margin-bottom: 2rem;">Top Choices</h2>
        
            <div class="car-grid" id="car-grid-container">
                {% for car in cars %}
                <a href="{% url 'dashboard' %}?track={{ selected_track.slug_id }}&car={{ car.slug_id }}" class="car-link" style="text-decoration: none;">
                    <div class="car-card">
                        <img src="{% static car.image_path %}" alt="{{ car.name }}">
                        <div class="car-name">{{ car.name }}</div>
                    </div>
                </a>
                {% endfor %}
            </div>

        </main>
    </div>

    <script>
        document.getElementById('car-search').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const cars = document.querySelectorAll('.car-link');
            
            cars.forEach(car => {
                const name = car.querySelector('.car-name').innerText.toLowerCase();
                if(name.includes(term)) {
                    car.style.display = 'block';
                } else {
                    car.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
